<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid — Grok Voice + Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header { padding: 1.5rem 1rem 0.5rem; text-align: center; }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #f0f0f0;
    }

    .subtitle { color: #555; font-size: 0.8rem; margin-top: 0.3rem; }

    /* Camera preview */
    #camera-container {
      position: relative;
      width: 280px;
      height: 210px;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px solid #333;
      margin: 1rem 0;
      background: #111;
    }

    #camera-container.active { border-color: #f59e0b; }

    #camera {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #vision-badge {
      display: none;
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(245, 158, 11, 0.9);
      color: #000;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
    }

    #vision-badge.active { display: block; }

    #camera-off {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.85rem;
    }

    /* Screen share preview */
    #screen-container {
      position: relative;
      width: 280px;
      height: 210px;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px solid #333;
      background: #111;
    }

    #screen-container.active { border-color: #38bdf8; }

    #screen-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    #screen-container.active #screen-preview { display: block; }
    #screen-container.active #screen-off { display: none; }

    #screen-badge {
      display: none;
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(56, 189, 248, 0.9);
      color: #000;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
    }

    #screen-badge.active { display: block; }

    #screen-off {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.75rem;
    }

    #screen-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #screen-btn:hover { border-color: #38bdf8; }

    /* Status + controls */
    #status {
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      background: #111;
      border: 1px solid #333;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }

    #status.connected { border-color: #f59e0b; color: #f59e0b; }
    #status.error { border-color: #f87171; color: #f87171; }
    #status.connecting { border-color: #facc15; color: #facc15; }

    #mic-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #mic-btn:hover { border-color: #f59e0b; background: #1a1a1a; }

    #mic-btn.active {
      border-color: #f59e0b;
      background: #1a1408;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.3); }
      50% { box-shadow: 0 0 0 16px rgba(245, 158, 11, 0); }
    }

    /* Transcript */
    #transcript {
      flex: 1;
      width: 100%;
      max-width: 640px;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 1rem;
      max-width: 85%;
      font-size: 0.9rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .msg.assistant {
      background: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .msg.tool {
      background: #1a1408;
      align-self: flex-start;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      border-left: 3px solid #f59e0b;
      border-radius: 0.5rem;
    }

    .msg.system {
      background: transparent;
      align-self: center;
      color: #555;
      font-size: 0.75rem;
    }

    /* Text input */
    #text-input-area {
      width: 100%;
      max-width: 640px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
    }

    #text-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: 1px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }

    #text-input:focus { border-color: #f59e0b; }
    #text-input:disabled { opacity: 0.4; }

    #send-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid #333;
      background: #141414;
      color: #e0e0e0;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }

    #send-btn:hover:not(:disabled) { border-color: #f59e0b; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>HYBRID</h1>
    <p class="subtitle">Grok Eve Voice + Gemini Vision</p>
  </header>

  <div style="display:flex; gap:0.75rem; align-items:flex-start; margin:1rem 0;">
    <div id="camera-container">
      <video id="camera" autoplay playsinline muted></video>
      <div id="vision-badge">ANALYZING</div>
      <div id="camera-off">Camera off</div>
    </div>
    <div id="screen-container">
      <video id="screen-preview" autoplay playsinline muted></video>
      <div id="screen-badge">ANALYZING</div>
      <div id="screen-off">
        <button id="screen-btn" title="Share screen">&#x1f5b5;</button>
        <div style="margin-top:0.4rem">Share Screen</div>
      </div>
    </div>
  </div>

  <div id="status">disconnected</div>

  <button id="mic-btn" title="Click to start / stop">&#x1f3a4;</button>

  <div id="transcript"></div>

  <div id="text-input-area">
    <input type="text" id="text-input" placeholder="Type a message..." disabled />
    <button id="send-btn" disabled>Send</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

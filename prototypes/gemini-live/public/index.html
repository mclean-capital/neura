<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Live Audio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 2rem 1rem 1rem;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #f0f0f0;
    }

    .subtitle {
      color: #555;
      font-size: 0.8rem;
      margin-top: 0.4rem;
    }

    #status {
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      background: #111;
      border: 1px solid #333;
      margin: 1rem 0 1.5rem;
      transition: all 0.3s;
    }

    #status.connected { border-color: #4ade80; color: #4ade80; }
    #status.error { border-color: #f87171; color: #f87171; }
    #status.connecting { border-color: #facc15; color: #facc15; }

    #mic-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #mic-btn:hover { border-color: #4ade80; background: #1a1a1a; }

    #mic-btn.active {
      border-color: #4ade80;
      background: #0a1f10;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.3); }
      50% { box-shadow: 0 0 0 16px rgba(74, 222, 128, 0); }
    }

    #transcript {
      flex: 1;
      width: 100%;
      max-width: 640px;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 1rem;
      max-width: 85%;
      font-size: 0.9rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .msg.assistant {
      background: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .msg.tool {
      background: #1f1a0a;
      align-self: flex-start;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      border-left: 3px solid #f59e0b;
      border-radius: 0.5rem;
    }

    .msg.system {
      background: transparent;
      align-self: center;
      color: #555;
      font-size: 0.75rem;
    }

    #text-input-area {
      width: 100%;
      max-width: 640px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
    }

    #text-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: 1px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }

    #text-input:focus { border-color: #4ade80; }
    #text-input:disabled { opacity: 0.4; }

    #send-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid #333;
      background: #141414;
      color: #e0e0e0;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }

    #send-btn:hover:not(:disabled) { border-color: #4ade80; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>GEMINI LIVE</h1>
    <p class="subtitle">Native Audio &middot; Model 3.1</p>
  </header>

  <div id="status">disconnected</div>

  <button id="mic-btn" title="Click to start / stop conversation">&#x1f3a4;</button>

  <div id="transcript"></div>

  <div id="text-input-area">
    <input type="text" id="text-input" placeholder="Type a message..." disabled />
    <button id="send-btn" disabled>Send</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

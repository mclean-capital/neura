# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy_frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: cd frontend && npm run lint && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEURA_20293 }}
          channelId: live
          projectId: neura-20293
        env:
          VITE_BACKEND_API_URL: https://neura--neura-20293.us-central1.hosted.app
          FIREBASE_CLI_EXPERIMENTS: webframeworks
  build_and_deploy_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: cd backend && npm run lint && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEURA_20293 }}
          channelId: live
          projectId: neura-20293
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
  build_and_deploy_agent:
    name: Build and Deploy Agent Worker (Cloud Run)
    runs-on: ubuntu-latest
    needs: build_and_deploy_frontend # Optional: Deploy sequentially if needed
    permissions:
      contents: "read"
      id-token: "write" # Needed for Workload Identity Federation
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Dependencies (Workspaces)
        run: npm ci --workspaces --if-present

      - name: Build Agent
        run: npm run build --workspace=agent

      - name: Deploy Agent Worker to Cloud Run
        id: deploy-agent
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neura-agent
          region: us-central1
          source: ./agent # Deploy from the agent directory
          # Set environment variables using secrets
          env_vars: |
            LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}
            CARTESIA_API_KEY=${{ secrets.CARTESIA_API_KEY }}
          flags: '--cpu=1 --memory=512Mi --entry-point="node dist/index.js"' # No --allow-unauthenticated, No --port

      # Optional: Output the deployed service URL (though it's not directly accessed)
      - name: Show Agent Worker URL
        run: |
          echo "Agent Worker URL: ${{ steps.deploy-agent.outputs.url }}"

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx turbo run typecheck
      - name: Lint
        run: npx turbo run lint
      - name: Format check
        run: npx prettier --check .
      - name: Test
        run: npx turbo run test

  release:
    name: Semantic Release
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sr.outputs.tag }}
      released: ${{ steps.sr.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Get pre-release version
        id: pre
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      # Detect whether semantic-release created a new version by comparing
      # package.json before and after. Note: this detection relies on a local
      # diff, so rerunning this workflow after the release step already
      # succeeded (but a build job failed) will see no version change and
      # skip builds. In that case, use workflow_dispatch on core-build.yml
      # or desktop-build.yml to retry with the tag directly.
      - name: Semantic Release
        id: sr
        run: |
          npx semantic-release
          POST_VERSION=$(node -p "require('./package.json').version")
          PRE_VERSION="${{ steps.pre.outputs.version }}"
          if [ "$POST_VERSION" != "$PRE_VERSION" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "tag=v$POST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  core-build:
    name: Core Build
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/core-build.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    permissions:
      contents: write

  desktop-build:
    name: Desktop Build
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/desktop-build.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    permissions:
      contents: write

  cli-publish:
    name: CLI Publish
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/cli-publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write

name: Core Build

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Package core bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            archive: tar.gz
          - os: linux
            arch: arm64
            archive: tar.gz
          - os: darwin
            arch: x64
            archive: tar.gz
          - os: darwin
            arch: arm64
            archive: tar.gz
          - os: windows
            arch: x64
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Build core and its dependencies (types, utils) via turbo
      - name: Build core
        run: npx turbo run build --filter=@neura/core

      # Extract version from release tag
      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Assemble the core distribution
      - name: Assemble core bundle
        run: |
          mkdir -p staging/core

          # Core bundle and sourcemap
          cp packages/core/dist/server.bundled.mjs staging/core/
          cp packages/core/dist/server.bundled.mjs.map staging/core/

          # Package.json for ESM "type": "module"
          cp packages/core/package.json staging/core/

          # Compiled stores (dynamically imported)
          mkdir -p staging/core/stores
          cp packages/core/dist/stores/*.js staging/core/stores/ 2>/dev/null || true
          cp packages/core/dist/stores/*.js.map staging/core/stores/ 2>/dev/null || true

          # PGlite (WASM PostgreSQL + pgvector)
          mkdir -p staging/core/node_modules/@electric-sql/pglite
          cp node_modules/@electric-sql/pglite/package.json staging/core/node_modules/@electric-sql/pglite/
          cp -r node_modules/@electric-sql/pglite/dist staging/core/node_modules/@electric-sql/pglite/

          # Version file
          echo "${{ steps.version.outputs.version }}" > staging/core/version.txt

      # Package as archive
      - name: Package archive
        run: |
          cd staging/core
          ASSET="neura-core-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf "../../${ASSET}.tar.gz" .
          else
            zip -r "../../${ASSET}.zip" .
          fi

      # Upload to release
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            neura-core-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive }}

steps:
  # store environment variables in .env file
  - name: "bash"
    script: |
      #!/usr/bin/env bash
      printenv >> .env
  # build container image with both latest and commit SHA tags
  - name: "gcr.io/cloud-builders/docker"
    dir: "agent"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:$COMMIT_SHA"
      - "."
  # push container images
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:latest"
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:$COMMIT_SHA"
  # scale current gke deployment to 0
  - name: gcr.io/cloud-builders/kubectl
    args:
      - scale
      - --replicas=0
      - deployment/$_K8S_APP_NAME
    env:
      - "CLOUDSDK_COMPUTE_ZONE=${_GKE_LOCATION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"

  # scale current gke deployment to 0
  - name: gcr.io/cloud-builders/kubectl
    args:
      - scale
      - --replicas=1
      - deployment/$_K8S_APP_NAME
    env:
      - "CLOUDSDK_COMPUTE_ZONE=${_GKE_LOCATION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"

  - name: gcr.io/cloud-builders/kubectl
    args:
      - set
      - image
      - deployment/$_K8S_APP_NAME
      - $_K8S_APP_NAME=gcr.io/$PROJECT_ID/$REPO_NAME/agent:$COMMIT_SHA
    env:
      - "CLOUDSDK_COMPUTE_ZONE=${_GKE_LOCATION}"
      - "CLOUDSDK_CONTAINER_CLUSTER=${_GKE_CLUSTER}"
images:
  - "$_IMAGE_NAME:$COMMIT_SHA"
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _K8S_LABELS: ""
  _OUTPUT_BUCKET_PATH: neura-20293_cloudbuild/deploy
  _DOCKERFILE_DIR: "agent"
  _K8S_YAML_PATH: agent
  _K8S_APP_NAME: neura-agent-deployment
  _DOCKERFILE_NAME: Dockerfile
  _K8S_NAMESPACE: default
  _GKE_CLUSTER: neura-agent-deployment-cluster
  _K8S_ANNOTATIONS: gcb-trigger-id=3e639f70-1e19-4df4-b35d-4582faeae05f
  _GKE_LOCATION: us-central1
  _IMAGE_NAME: gcr.io/neura-20293/github.com/mclean-capital/neura
tags:
  - gcp-cloud-build-deploy
  - $_K8S_APP_NAME


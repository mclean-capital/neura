steps:
  # store environment variables in .env file
  - name: "bash"
    script: |
      #!/usr/bin/env bash
      printenv >> .env
  # build container image with both latest and commit SHA tags
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:$COMMIT_SHA"
      - "."
  # push container images
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:latest"
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:$COMMIT_SHA"
  # deploy container image to Cloud Run
  - name: "google/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "neura-agent"
      - "--image"
      - "gcr.io/$PROJECT_ID/$REPO_NAME/agent:latest" # Changed repo name to match your job name
      - "--region"
      - "$_LOCATION"
      - "--platform=managed" # Add platform flag for Cloud Run
      - "--allow-unauthenticated" # Add this to allow public access
options:
  logging: CLOUD_LOGGING_ONLY

appId: com.mclean-capital.neura
productName: Neura
copyright: Copyright (c) McLean Capital
directories:
  output: release
  buildResources: assets

files:
  - dist-main/**/*
  - dist-preload/**/*
  - package.json

extraResources:
  # Core server — single esbuild bundle
  - from: ../core/dist/server.bundled.mjs
    to: core/server.bundled.mjs
  # Sourcemap for crash diagnostics — remove for smaller DMG if not needed
  - from: ../core/dist/server.bundled.mjs.map
    to: core/server.bundled.mjs.map
  # Core package.json needed so stores/*.js files are parsed as ESM
  - from: ../core/package.json
    to: core/package.json
  # Stores module — dynamically imported so PGlite WASM only loads when PG_DATA_PATH is set
  - from: ../core/dist/stores
    to: core/stores
    filter:
      - '**/*.js'
      - '**/*.js.map'
  # PGlite (WASM PostgreSQL 17 + pgvector) needed by stores at runtime
  - from: ../../node_modules/@electric-sql/pglite
    to: core/node_modules/@electric-sql/pglite
    filter:
      - 'package.json'
      - 'dist/**/*'
  - from: dist-renderer
    to: renderer
    filter:
      - '**/*'
  - from: assets
    to: assets
    filter:
      - '**/*'

asar: true
asarUnpack:
  - '**/*.node'

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  extendInfo:
    NSCameraUsageDescription: Neura uses your camera for real-time visual understanding.
    NSMicrophoneUsageDescription: Neura uses your microphone for voice conversation.
    NSScreenCaptureUsageDescription: Neura can view your screen to help with what you're working on.
    NSAudioCaptureUsageDescription: Neura can capture system audio while sharing your screen.

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility

publish:
  provider: github
  owner: mclean-capital
  repo: neura

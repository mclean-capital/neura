appId: com.mclean-capital.neura
productName: Neura
copyright: Copyright (c) McLean Capital
directories:
  output: release
  buildResources: assets

files:
  - dist-main/**/*
  - dist-preload/**/*
  - package.json

extraResources:
  # Core server — dist/core/ now contains the main esbuild bundle plus
  # version.txt, mirroring the target layout exactly. Since v1.11.0 the
  # core source build writes to `dist/core/` (and `dist/stores/`) so the
  # produced artifact can be run directly from `dist/core/` AND dropped
  # verbatim into CLI or desktop packaging with no path rewriting.
  - from: ../core/dist/core
    to: core
    filter:
      - 'server.bundled.mjs'
      - 'server.bundled.mjs.map'
      - 'version.txt'
  # Stores bundle — dynamically imported via '../stores/index.js' from
  # server.bundled.mjs, so the bundle MUST live at `resources/stores/` (a
  # sibling of `core/`), not `resources/core/stores/`. See tools/bundle-core-into-cli.mjs
  # for the same constraint on the CLI side.
  #
  # The `package.json` is an ESM type sidecar written by scripts/bundle.ts —
  # without it Node would parse this ESM module as CommonJS because the
  # nearest package.json up the tree would otherwise be missed.
  - from: ../core/dist/stores
    to: stores
    filter:
      - '**/*.js'
      - '**/*.js.map'
      - 'package.json'
  # Runtime dependency closure of onnxruntime-node and @electric-sql/pglite.
  # Prepared by tools/prepare-desktop-native-deps.mjs which walks the transitive
  # tree from the workspace node_modules and stages it in build-resources/.
  # Shipped at `resources/node_modules/` so both the main bundle (resolves
  # onnxruntime-node from `resources/core/..`) and the stores bundle (resolves
  # @electric-sql/pglite from `resources/stores/..`) can find what they need
  # via Node's normal upward module resolution.
  - from: build-resources/node_modules
    to: node_modules
  - from: dist-renderer
    to: renderer
    filter:
      - '**/*'
  - from: assets
    to: assets
    filter:
      - '**/*'

asar: true
asarUnpack:
  - '**/*.node'

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  extendInfo:
    NSCameraUsageDescription: Neura uses your camera for real-time visual understanding.
    NSMicrophoneUsageDescription: Neura uses your microphone for voice conversation.
    NSScreenCaptureUsageDescription: Neura can view your screen to help with what you're working on.
    NSAudioCaptureUsageDescription: Neura can capture system audio while sharing your screen.

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility

publish:
  provider: github
  owner: mclean-capital
  repo: neura
